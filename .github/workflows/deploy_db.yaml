name: Deploy database migrations

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/**'
      - '.github/workflows/deploy_db.yaml'
      - '.github/workflows/validate_db.yaml'

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate_db:
    name: Validate database
    uses: ./.github/workflows/validate_db.yaml

  prod:
    name: Deploy prod
    runs-on: ubuntu-latest
    needs: [validate_db]
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate required secret
        run: |
          if [ -z "$SUPABASE_DB_URL" ]; then
            echo "Missing required secret: SUPABASE_DB_URL" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Deploy db changes
        run: supabase db push --db-url "$SUPABASE_DB_URL"
