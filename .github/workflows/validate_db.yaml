name: Validate database

permissions:
  contents: read

on:
  workflow_call:
  workflow_dispatch:

jobs:
  validate_db:
    name: Validate database
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start Supabase
        run: supabase db start
      - name: Lint database
        run: supabase db lint
      - name: Run tests
        run: supabase test db
